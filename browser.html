<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eicon Browser</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --header-h: 54px;
      --status-h: 24px;
      --bg:     #141414;
      --bg2:    #1e1e1e;
      --border: #282828;
      --text:   #c8c8c8;
      --dim:    #505050;
      --accent: #4a7a4a;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: sans-serif; }

    /* ── Header ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 14px;
      z-index: 100;
    }

    .logo { display: flex; flex-direction: column; line-height: 1.2; flex-shrink: 0; }
    .logo-title  { font-size: 0.95rem; font-weight: 500; color: #fff; }
    .logo-credit { font-size: 0.62rem; color: var(--dim); }
    .logo-credit a { color: #5a9a5a; text-decoration: none; }
    .logo-credit a:hover { text-decoration: underline; }

    .search-wrap { flex: 1; max-width: 480px; position: relative; }
    .search-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.38rem 2rem 0.38rem 0.75rem;
      color: var(--text);
      font-size: 0.88rem;
      outline: none;
    }
    .search-input:focus  { border-color: var(--accent); }
    .search-input.active { border-color: #5a9a5a; background: #161e16; }
    .search-input::placeholder { color: var(--dim); }

    /* Ghost chips — persistent search tokens shown as pills inside the search wrap */
    .ghost-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 4px 8px 0;
      display: none; /* shown when chips exist */
    }
    .ghost-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-family: monospace;
      cursor: default;
      background: #1e3a1e;
      border: 1px solid #2a5a2a;
      color: #7dbf7d;
    }
    .ghost-chip.negated {
      background: #3a1e1e;
      border-color: #5a2a2a;
      color: #bf7d7d;
    }
    .ghost-chip-remove {
      background: none;
      border: none;
      color: inherit;
      opacity: 0.6;
      cursor: pointer;
      font-size: 0.7rem;
      padding: 0;
      line-height: 1;
    }
    .ghost-chip-remove:hover { opacity: 1; }

    .search-clear {
      position: absolute;
      right: 7px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--dim);
      font-size: 0.85rem;
      cursor: pointer;
      line-height: 1;
      padding: 3px 5px;
      border-radius: 3px;
      display: none;       /* shown via JS with display:flex */
      align-items: center;
      justify-content: center;
    }
    .search-clear:hover { color: var(--text); background: #333; }

    .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

    .btn {
      background: #232323;
      color: #999;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.32rem 0.7rem;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.1s, color 0.1s;
    }
    .btn:hover:not(:disabled) { background: #2a2a2a; color: #ccc; }
    .btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Grid scroller ── */
    #scroller {
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0;
      bottom: var(--status-h);
      overflow-y: scroll;
      overflow-x: hidden;
    }

    #canvas { position: relative; width: 100%; }

    /* ── Cells ── */
    .cell {
      position: absolute;
      border-radius: 4px;
      overflow: hidden;
      background: #1a1a1a;
      cursor: pointer;
    }
    .cell:hover { outline: 2px solid var(--accent); outline-offset: 1px; }

    .cell img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

    /* Copy flash overlay — sits on top of img, invisible until flash class added */
    .cell-overlay {
      position: absolute;
      inset: 0;
      border-radius: 3px;
      pointer-events: none;
      opacity: 0;
    }
    @keyframes copyFlash {
      0%   { opacity: 0.65; background: #fff; }
      100% { opacity: 0;    background: #fff; }
    }
    .cell-overlay.flash {
      animation: copyFlash 0.7s ease-out forwards;
    }

    /* ── Tag button (appears on cell hover) ── */
    .cell-tag-btn {
      position: absolute;
      bottom: 3px;
      right: 3px;
      width: 22px;
      height: 22px;
      border-radius: 3px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 0.9rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.1s, background 0.1s;
      z-index: 2;
      /* Shift the yellow label emoji into green */
      filter: hue-rotate(75deg) saturate(1.4) brightness(0.9);
    }
    .cell:hover .cell-tag-btn { opacity: 1; }
    .cell-tag-btn:hover {
      background: rgba(30,60,30,0.9);
      filter: hue-rotate(75deg) saturate(2) brightness(1.1);
    }
    /* Tagged state — slightly visible even without hover */
    .cell-tag-btn.has-tags {
      opacity: 0.6;
      filter: hue-rotate(75deg) saturate(2.5) brightness(1.2);
    }
    .cell:hover .cell-tag-btn.has-tags { opacity: 1; }

    /* ── Tag modal ── */
    #tag-modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }
    #tag-modal-backdrop.open { display: flex; }

    #tag-modal {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 10px;
      width: 420px;
      max-width: calc(100vw - 32px);
      max-height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    .modal-preview {
      width: 60px;
      height: 60px;
      border-radius: 6px;
      background: #141414;
      border: 1px solid #2a2a2a;
      object-fit: contain;
      flex-shrink: 0;
    }
    .modal-title {
      flex: 1;
      min-width: 0;
    }
    .modal-eicon-name {
      font-size: 0.95rem;
      color: #ddd;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .modal-eicon-sub {
      font-size: 0.72rem;
      color: #555;
      margin-top: 2px;
    }
    .modal-close {
      background: none;
      border: none;
      color: #555;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .modal-close:hover { color: #aaa; background: #2a2a2a; }

    .modal-body {
      padding: 16px;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal-section-label {
      font-size: 0.68rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    /* Tag chips */
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 28px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #2a3a2a;
      border: 1px solid #3a5a3a;
      border-radius: 4px;
      padding: 3px 8px 3px 9px;
      font-size: 0.8rem;
      color: #8dbf8d;
      cursor: default;
    }
    .chip-remove {
      background: none;
      border: none;
      color: #5a8a5a;
      font-size: 0.75rem;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      margin-left: 1px;
    }
    .chip-remove:hover { color: #e05c5c; }
    .chip-empty { color: #444; font-size: 0.8rem; font-style: italic; }

    /* Tag input */
    .tag-input-wrap {
      display: flex;
      gap: 8px;
    }
    .tag-input {
      flex: 1;
      background: #141414;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0.4rem 0.7rem;
      color: #ccc;
      font-size: 0.85rem;
      outline: none;
    }
    .tag-input:focus { border-color: var(--accent); }
    .tag-input::placeholder { color: #444; }
    .tag-add-btn {
      background: #2a3a2a;
      border: 1px solid #3a5a3a;
      border-radius: 6px;
      color: #8dbf8d;
      font-size: 0.82rem;
      padding: 0 14px;
      cursor: pointer;
    }
    .tag-add-btn:hover { background: #344a34; }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    .modal-btn {
      border-radius: 6px;
      padding: 0.35rem 1rem;
      font-size: 0.84rem;
      cursor: pointer;
      border: 1px solid #333;
    }
    .modal-btn.cancel { background: #232323; color: #888; }
    .modal-btn.cancel:hover { background: #2a2a2a; color: #aaa; }
    .modal-btn.save   { background: #2a3a2a; color: #8dbf8d; border-color: #3a5a3a; }
    .modal-btn.save:hover { background: #344a34; }
    #tooltip {
      position: fixed;
      background: rgba(0,0,0,0.88);
      color: #ddd;
      font-size: 0.76rem;
      padding: 3px 8px;
      border-radius: 4px;
      pointer-events: none;
      display: none;
      z-index: 9999;
      white-space: nowrap;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Loading overlay ── */
    #loading {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: var(--dim);
      font-size: 0.9rem;
      text-align: center;
    }

    /* ── Status bar ── */
    #statusbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--status-h);
      background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 20px;
      font-size: 0.7rem;
      color: var(--dim);
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <span class="logo-title">Eicon Browser</span>
      <span class="logo-credit">powered by <a href="https://xariah.net/eicons" target="_blank" rel="noopener">Xariah Dailstone</a></span>
    </div>
    <div class="search-wrap" id="search-wrap">
      <div class="ghost-chips" id="ghost-chips"></div>
      <input class="search-input" id="search-input" type="text"
             placeholder="Loading…" disabled autocomplete="off" spellcheck="false">
      <button class="search-clear" id="search-clear" title="Clear all (Esc)">✕</button>
    </div>
    <div class="header-right">
      <button class="btn" id="btn-shuffle" onclick="newRandomSet()" disabled>↺ New random set</button>
      <button class="btn" id="btn-dev-tags" disabled>📡 Dev tags</button>
    </div>
  </header>

  <!-- Tag modal -->
  <div id="tag-modal-backdrop">
    <div id="tag-modal">
      <div class="modal-header">
        <img class="modal-preview" id="modal-preview" src="" alt="">
        <div class="modal-title">
          <div class="modal-eicon-name" id="modal-eicon-name">—</div>
          <div class="modal-eicon-sub" id="modal-tag-count">no tags</div>
        </div>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div id="modal-recent-wrap" style="display:none">
          <div class="modal-section-label">Recent tags</div>
          <div class="chip-row" id="modal-recent-chips" style="margin-bottom:0"></div>
        </div>
        <div>
          <div class="modal-section-label">Tags</div>
          <div class="chip-row" id="modal-chips"></div>
        </div>
        <div>
          <div class="modal-section-label">Add tag</div>
          <div class="tag-input-wrap">
            <input class="tag-input" id="tag-input"
                   placeholder="type a tag, press Enter or comma…"
                   autocomplete="off" spellcheck="false">
            <button class="tag-add-btn" id="tag-add-btn">Add</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn cancel" id="modal-cancel">Cancel</button>
        <button class="modal-btn save"   id="modal-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Message bar — slides down from header edge -->
  <div id="msg-bar"><span id="msg-text"></span></div>

  <div id="scroller">
    <div id="canvas"></div>
  </div>

  <div id="loading">Loading index…</div>
  <div id="tooltip"></div>

  <div id="statusbar">
    <span id="stat-count">—</span>
    <span id="stat-pos">—</span>
    <span id="stat-hint" style="margin-left:auto">click an eicon to copy its code</span>
  </div>

  <script type="module">
    import { showMessage }             from './modules/messages.js';
    import { openDB, idbGet, idbSet }  from './modules/idb.js';
    import { decompress }              from './modules/workers.js';
    import { openTagDB, getTags, setTags, getAllTags } from './modules/tags.js';

    // ── Config ────────────────────────────────────────────────────────
    // Modules in use:
    //   messages.js  — showMessage(text, durationMs?)
    //   idb.js       — openDB(), idbGet(), idbSet(), idbDel()
    //   workers.js   — decompress(arrayBuffer) → { names, groups }
    //   tags.js      — openTagDB(), getTags(), setTags(), getAllTags()
    const WORKER_BASE = 'https://eicon-status-worker.joepurple.workers.dev';
    const IDB_NAME    = 'eicon-browser';
    const IDB_VER     = 1;
    const IDB_STORE   = 'index';
    const CACHE_MAX   = 7 * 24 * 3600;

    const CELL  = 100;        // native eicon size (px)
    const GAP   = 5;
    const PITCH = CELL + GAP; // 105px
    const ABOVE = 2;
    const BELOW = 6;

    // ── Composite specs ───────────────────────────────────────────────
    // Empty until the tag system provides data.
    // Format: Map<firstName, {cols: N, rows: M}>
    // e.g. compositeSpecs.set('rohriride1', {cols: 2, rows: 3})
    // When populated, getItemSize() returns the correct pixel dimensions
    // and the masonry layout engine (to be wired in with tag data) will
    // compute positions so composites don't overlap single eicons.
    const compositeSpecs = new Map();

    function getItemSize(name) {
      const spec = compositeSpecs.get(name);
      return spec
        ? { w: spec.cols * PITCH - GAP, h: spec.rows * PITCH - GAP }
        : { w: CELL, h: CELL };
    }

    // ── State ─────────────────────────────────────────────────────────
    let allNames     = [];
    let nameGroups   = [];
    let displayNames = [];
    let cols         = 1;
    let totalRows    = 0;
    let poolCells    = [];
    let rafPending   = false;
    let isSearching  = false;
    let tagDB        = null;  // opened at boot, used by modal and tag button rendering
    let tagCache     = new Map(); // name → string[] — in-memory cache, avoids redundant IDB reads

    // ── DOM ───────────────────────────────────────────────────────────
    const scroller    = document.getElementById('scroller');
    const canvas      = document.getElementById('canvas');
    const loading     = document.getElementById('loading');
    const tooltip     = document.getElementById('tooltip');
    const statCount   = document.getElementById('stat-count');
    const statPos     = document.getElementById('stat-pos');
    const btnShuffle  = document.getElementById('btn-shuffle');
    const btnDevTags  = document.getElementById('btn-dev-tags');

    // ── Dev tags import ───────────────────────────────────────────────
    const DEV_TAGS_URL = 'https://mojojohoe.github.io/F-List-Eicon-Categories/dev_tags.txt';

    async function fetchDevTags() {
      btnDevTags.disabled = true;
      btnDevTags.textContent = '📡 Fetching…';
      try {
        const res  = await fetch(DEV_TAGS_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();

        // Dry-run: count what would be added without writing
        const parsed  = JSON.parse(text);
        const source  = parsed.version ? parsed.tags : parsed;
        const existing = await getAllTags(tagDB);
        let wouldAdd = 0;
        for (const [name, tagVal] of Object.entries(source)) {
          if (!existing.has(name)) {
            const tags = typeof tagVal === 'string'
              ? tagVal.split(',').map(t => t.trim()).filter(Boolean)
              : [];
            if (tags.length > 0) wouldAdd++;
          }
        }

        const total = Object.keys(source).length;
        const msg = wouldAdd === 0
          ? 'Dev tags: nothing new to add — you already have everything.'
          : `Dev tags: ${wouldAdd.toLocaleString()} new eicons of ${total.toLocaleString()} total. Merge?`;

        if (wouldAdd === 0) {
          showMessage(msg, 4000);
          return;
        }

        if (!confirm(msg + '\n\nYour existing tags will never be overwritten.')) return;

        const { added, skipped } = await importTags(tagDB, text);
        tagCache = await getAllTags(tagDB);
        refreshWorkerTags();
        showMessage(`Dev tags merged: ${added.toLocaleString()} eicons added, ${skipped.toLocaleString()} already had tags.`, 5000);

      } catch (err) {
        showMessage(`Dev tags failed: ${err.message}`, 4000);
      } finally {
        btnDevTags.disabled = false;
        btnDevTags.textContent = '📡 Dev tags';
      }
    }

    btnDevTags.addEventListener('click', fetchDevTags);
    const searchInput = document.getElementById('search-input');
    const searchClear = document.getElementById('search-clear');

    // showMessage() is imported from messages.js (see module script tag)

    // ── IDB store name (passed to all idb.js calls) ───────────────────
    const STORE = IDB_STORE;

    // ── Persistent search worker ──────────────────────────────────────
    // Holds names + tag map. Supports: tag search, name fallback,
    // negation (-prefix), ghost chips, scored results.
    const SEARCH_SRC = `
let names = [];
let tagMap = {};

self.onmessage = (e) => {
  if (e.data.init) { names = e.data.init; return; }
  if (e.data.tags !== undefined) { tagMap = e.data.tags; return; }

  const { query, chips } = e.data;
  const positives = [];
  const negatives = [];

  for (const chip of (chips || [])) {
    (chip.negated ? negatives : positives).push(chip.text.toLowerCase());
  }
  const inputTrim = (query || '').trim();
  if (inputTrim) {
    const neg = inputTrim.startsWith('-');
    const txt = neg ? inputTrim.slice(1).trim() : inputTrim;
    if (txt) (neg ? negatives : positives).push(txt.toLowerCase());
  }

  if (positives.length === 0 && negatives.length === 0) {
    self.postMessage({ results: null, query, chips });
    return;
  }

  const scored = [];
  for (let i = 0; i < names.length; i++) {
    const name    = names[i];
    const nameLow = name.toLowerCase();
    const tagsLow = tagMap[name] ? tagMap[name].toLowerCase() : '';

    let excluded = false;
    for (const neg of negatives) {
      if (nameLow.includes(neg) || tagsLow.includes(neg)) { excluded = true; break; }
    }
    if (excluded) continue;

    let score = 0, tagScore = 0, bonus = 0;
    for (const pos of positives) {
      if (tagsLow.includes(pos)) { score++; tagScore++; }
      else if (nameLow.includes(pos)) { score++; }
    }
    if (score === 0) continue;

    if (tagsLow) {
      const tagList = tagsLow.split(',').map(t => t.trim());
      for (const pos of positives) { if (tagList.includes(pos)) bonus++; }
    }

    scored.push({ name, total: score + bonus, tagScore });
  }

  scored.sort((a, b) => b.total - a.total || b.tagScore - a.tagScore || a.name.localeCompare(b.name));
  self.postMessage({ results: scored.map(s => s.name), query, chips });
};`;

    let searchWorker   = null;
    let searchDebounce = null;
    let pendingQuery   = '';
    let activeChips    = [];

    const ghostChipsEl = document.getElementById('ghost-chips');

    function initSearchWorker(names) {
      const url = URL.createObjectURL(new Blob([SEARCH_SRC], {type:'application/javascript'}));
      searchWorker = new Worker(url);
      searchWorker.postMessage({ init: names });
      searchWorker.postMessage({ tags: buildTagObject() });
      searchWorker.onmessage = ({ data: { results, query } }) => {
        if (query !== pendingQuery) return;
        results === null ? exitSearch() : applySearchResults(results);
      };
    }

    function buildTagObject() {
      const obj = {};
      for (const [name, tags] of tagCache) obj[name] = tags.join(', ');
      return obj;
    }

    function refreshWorkerTags() {
      if (searchWorker) searchWorker.postMessage({ tags: buildTagObject() });
    }

    // ── Ghost chips ───────────────────────────────────────────────────
    function renderGhostChips() {
      ghostChipsEl.innerHTML = '';
      ghostChipsEl.style.display = activeChips.length ? '' : 'none';
      activeChips.forEach((chip, i) => {
        const el  = document.createElement('div');
        el.className = 'ghost-chip' + (chip.negated ? ' negated' : '');
        const lbl = document.createElement('span');
        lbl.textContent = (chip.negated ? '−' : '') + chip.text;
        const rm  = document.createElement('button');
        rm.className = 'ghost-chip-remove';
        rm.textContent = '✕';
        rm.addEventListener('click', () => { activeChips.splice(i, 1); renderGhostChips(); triggerSearch(); });
        el.appendChild(lbl); el.appendChild(rm);
        ghostChipsEl.appendChild(el);
      });
      const has = activeChips.length > 0 || searchInput.value.trim().length > 0;
      searchClear.style.display = has ? 'flex' : 'none';
    }

    function commitCurrentToken() {
      const raw = searchInput.value.trim();
      if (!raw) return;
      const negated = raw.startsWith('-');
      const text    = (negated ? raw.slice(1) : raw).trim();
      if (!text) return;
      if (!activeChips.find(c => c.text === text && c.negated === negated)) {
        activeChips.push({ text, negated });
      }
      searchInput.value = '';
      renderGhostChips();
      triggerSearch();
    }

    function triggerSearch() {
      const q = searchInput.value.trim();
      pendingQuery = q;
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(() => {
        if (searchWorker) searchWorker.postMessage({ query: q, chips: activeChips });
      }, 150);
    }

    // ── Search input wiring ───────────────────────────────────────────
    function onSearchInput() {
      const q = searchInput.value;
      const has = activeChips.length > 0 || q.trim().length > 0;
      searchInput.classList.toggle('active', has);
      searchClear.style.display = has ? 'flex' : 'none';
      if (q.endsWith(',')) { searchInput.value = q.slice(0,-1); commitCurrentToken(); return; }
      triggerSearch();
    }

    function clearSearch() {
      searchInput.value = '';
      activeChips = [];
      pendingQuery = '';
      renderGhostChips();
      searchInput.classList.remove('active');
      searchClear.style.display = 'none';
      if (searchWorker) searchWorker.postMessage({ query: '', chips: [] });
    }

    searchInput.addEventListener('input', onSearchInput);
    searchInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); commitCurrentToken(); }
      if (e.key === 'Escape') clearSearch();
      if (e.key === 'Backspace' && searchInput.value === '' && activeChips.length > 0) {
        activeChips.pop(); renderGhostChips(); triggerSearch();
      }
    });
    searchClear.addEventListener('click', clearSearch);

    function applySearchResults(results) {
      isSearching = true;
      btnShuffle.disabled = true;
      resetPool();
      displayNames = results;
      recalc();
      scroller.scrollTop = 0;
      scheduleUpdate();
      const tagged = results.filter(n => tagCache.has(n)).length;
      statCount.textContent = tagged > 0
        ? `${results.length.toLocaleString()} matches (${tagged.toLocaleString()} tagged)`
        : `${results.length.toLocaleString()} matches`;
    }

    function exitSearch() {
      isSearching = false;
      btnShuffle.disabled = false;
      resetPool();
      applyShuffledDisplay(getSeed());
      recalc();
      scroller.scrollTop = 0;
      scheduleUpdate();
      statCount.textContent = `${allNames.length.toLocaleString()} eicons`;
    }

    // ── Shuffle ───────────────────────────────────────────────────────
    function rng(seed) {
      return () => {
        seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = (t + Math.imul(t ^ t >>> 7, 61 | t)) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }
    function shuffle(arr, seed) {
      const rand = rng(seed), a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(rand() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
      return a;
    }
    function getSeed() {
      let s = sessionStorage.getItem('browse-seed');
      if (!s) { s = (Math.random() * 2 ** 32) >>> 0; sessionStorage.setItem('browse-seed', String(s)); }
      return parseInt(s, 10);
    }
    function applyShuffledDisplay(seed) { displayNames = shuffle(nameGroups, seed).flat(); }

    function newRandomSet() {
      const s = (Math.random() * 2 ** 32) >>> 0;
      sessionStorage.setItem('browse-seed', String(s));
      applyShuffledDisplay(s);
      resetPool();
      recalc();
      scroller.scrollTop = 0;
      scheduleUpdate();
    }

    // ── Pool ──────────────────────────────────────────────────────────
    let indexToCell = new Map();
    let freePool    = [];

    function growPool(target) {
      while (poolCells.length < target) {
        const el      = document.createElement('div');
        el.className  = 'cell';
        el.style.display = 'none';

        const img     = document.createElement('img');
        img.alt       = '';
        img.draggable = false;

        const overlay = document.createElement('div');
        overlay.className = 'cell-overlay';

        const tagBtn  = document.createElement('button');
        tagBtn.className = 'cell-tag-btn';
        tagBtn.title  = 'Tag this eicon';
        tagBtn.textContent = '🏷️';
        tagBtn.addEventListener('click', e => {
          e.stopPropagation(); // prevent copy handler firing
          const name = el.dataset.name;
          if (name) openTagModal(name);
        });

        el.appendChild(img);
        el.appendChild(overlay);
        el.appendChild(tagBtn);
        canvas.appendChild(el);

        const cell = { el, img, overlay, tagBtn, idx: -1 };
        poolCells.push(cell);
        freePool.push(cell);
      }
    }

    function resetPool() {
      for (const cell of indexToCell.values()) {
        cell.img.src = '';
        cell.overlay.classList.remove('flash');
        cell.el.style.display = 'none';
        cell.idx = -1;
        freePool.push(cell);
      }
      indexToCell.clear();
    }

    // ── Layout ────────────────────────────────────────────────────────
    function recalc() {
      cols      = Math.max(1, Math.floor(scroller.clientWidth / PITCH));
      totalRows = Math.ceil(displayNames.length / cols);
      canvas._left = Math.max(0, Math.floor((scroller.clientWidth - cols * PITCH) / 2));
      canvas.style.height = (totalRows * PITCH + 40) + 'px';
      const visRows = Math.ceil(scroller.clientHeight / PITCH);
      growPool(cols * (visRows + ABOVE + BELOW + 4));
    }

    // ── Update (hot path) ─────────────────────────────────────────────
    function update() {
      rafPending = false;
      if (!displayNames.length) return;

      const scrollTop = scroller.scrollTop;
      const vh        = scroller.clientHeight;
      const left0     = canvas._left || 0;

      const firstRow = Math.max(0, Math.floor(scrollTop / PITCH) - ABOVE);
      const lastRow  = Math.min(totalRows - 1, Math.ceil((scrollTop + vh) / PITCH) + BELOW);
      const firstIdx = firstRow * cols;
      const lastIdx  = Math.min(displayNames.length - 1, (lastRow + 1) * cols - 1);

      // Pass 1: release out-of-range cells
      for (const [idx, cell] of indexToCell) {
        if (idx < firstIdx || idx > lastIdx) {
          cell.img.src = '';
          cell.overlay.classList.remove('flash');
          cell.el.style.display = 'none';
          cell.idx = -1;
          freePool.push(cell);
          indexToCell.delete(idx);
        }
      }

      // Pass 2: assign free cells to uncovered indices
      for (let nameIdx = firstIdx; nameIdx <= lastIdx; nameIdx++) {
        if (indexToCell.has(nameIdx)) continue;
        const cell = freePool.pop();
        if (!cell) break;

        const row  = Math.floor(nameIdx / cols);
        const col  = nameIdx % cols;
        const name = displayNames[nameIdx];
        const { w, h } = getItemSize(name); // composite-aware sizing

        cell.idx             = nameIdx;
        cell.el.dataset.name = name;
        cell.el.style.width  = w + 'px';
        cell.el.style.height = h + 'px';
        cell.el.style.top    = (row * PITCH) + 'px';
        cell.el.style.left   = (left0 + col * PITCH) + 'px';
        cell.el.style.display = '';
        cell.img.src = `https://static.f-list.net/images/eicon/${encodeURIComponent(name)}.gif`;
        // Reflect tag state on the tag button
        const hasTags = tagCache.has(name) && tagCache.get(name).length > 0;
        cell.tagBtn.classList.toggle('has-tags', hasTags);
        indexToCell.set(nameIdx, cell);
      }

      const pct = totalRows > 0 ? Math.round((scrollTop / (canvas.clientHeight - vh)) * 100) : 0;
      statPos.textContent = `${Math.min(100, Math.max(0, pct))}% scrolled`;
    }

    function scheduleUpdate() {
      if (!rafPending) { rafPending = true; requestAnimationFrame(update); }
    }

    // ── Copy flash ────────────────────────────────────────────────────
    function flashCell(cellEl) {
      const overlay = cellEl.querySelector('.cell-overlay');
      if (!overlay) return;
      overlay.classList.remove('flash');
      void overlay.offsetWidth; // force reflow to restart animation
      overlay.classList.add('flash');
      overlay.addEventListener('animationend', () => overlay.classList.remove('flash'), { once: true });
    }

    // ── Tooltip ───────────────────────────────────────────────────────
    scroller.addEventListener('mouseover', e => {
      const cell = e.target.closest?.('.cell');
      tooltip.style.display = (cell && cell.dataset.name) ? 'block' : 'none';
      if (cell && cell.dataset.name) tooltip.textContent = cell.dataset.name;
    }, { passive: true });

    scroller.addEventListener('mousemove', e => {
      if (tooltip.style.display === 'none') return;
      tooltip.style.left = Math.min(e.clientX + 14, window.innerWidth - 310) + 'px';
      tooltip.style.top  = Math.max(4, e.clientY - 34) + 'px';
    }, { passive: true });

    scroller.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; }, { passive: true });

    // ── Click to copy ─────────────────────────────────────────────────
    scroller.addEventListener('click', e => {
      const cell = e.target.closest?.('.cell');
      if (!cell || !cell.dataset.name) return;
      const bbcode = `[eicon]${cell.dataset.name}[/eicon]`;
      navigator.clipboard?.writeText(bbcode).then(() => {
        flashCell(cell);
        showMessage(`Copied: ${bbcode}`);
      });
    });

    // ── Scroll + resize ───────────────────────────────────────────────
    scroller.addEventListener('scroll', scheduleUpdate, { passive: true });
    window.addEventListener('resize', () => { recalc(); scheduleUpdate(); });

    // ── Tag modal ─────────────────────────────────────────────────────
    const backdrop     = document.getElementById('tag-modal-backdrop');
    const modalPreview = document.getElementById('modal-preview');
    const modalName    = document.getElementById('modal-eicon-name');
    const modalSub     = document.getElementById('modal-tag-count');
    const modalChips   = document.getElementById('modal-chips');
    const modalRecentWrap  = document.getElementById('modal-recent-wrap');
    const modalRecentChips = document.getElementById('modal-recent-chips');
    const tagInput     = document.getElementById('tag-input');
    const tagAddBtn    = document.getElementById('tag-add-btn');
    const modalClose   = document.getElementById('modal-close');
    const modalCancel  = document.getElementById('modal-cancel');
    const modalSave    = document.getElementById('modal-save');

    let modalEiconName = '';
    let modalTags      = [];
    let recentTags     = [];  // last 20 used, persisted in IDB

    async function loadRecentTags() {
      const db = await openTagDB();
      const stored = await getTags(db, '__recent__');
      recentTags = stored || [];
    }

    async function saveRecentTags(newTags) {
      // Prepend new tags, deduplicate, cap at 20
      for (const t of [...newTags].reverse()) {
        recentTags = [t, ...recentTags.filter(r => r !== t)];
      }
      recentTags = recentTags.slice(0, 20);
      const db = await openTagDB();
      await setTags(db, '__recent__', recentTags);
    }

    function renderRecentChips() {
      if (recentTags.length === 0) { modalRecentWrap.style.display = 'none'; return; }
      modalRecentWrap.style.display = '';
      modalRecentChips.innerHTML = '';
      for (const tag of recentTags) {
        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.style.cursor = 'pointer';
        chip.title = `Add "${tag}"`;
        chip.textContent = tag;
        chip.addEventListener('click', () => {
          if (!modalTags.includes(tag)) { modalTags.push(tag); renderModalChips(); }
        });
        modalRecentChips.appendChild(chip);
      }
    }

    function openTagModal(name) {
      modalEiconName = name;
      modalTags      = tagCache.has(name) ? [...tagCache.get(name)] : [];
      modalPreview.src = `https://static.f-list.net/images/eicon/${encodeURIComponent(name)}.gif`;
      modalName.textContent = name;
      tagInput.value = '';
      renderModalChips();
      renderRecentChips();
      backdrop.classList.add('open');
      tagInput.focus();
    }

    function closeTagModal() {
      backdrop.classList.remove('open');
      modalEiconName = '';
      modalTags      = [];
      modalPreview.src = '';
    }

    function renderModalChips() {
      modalSub.textContent = modalTags.length
        ? `${modalTags.length} tag${modalTags.length === 1 ? '' : 's'}`
        : 'no tags';

      if (modalTags.length === 0) {
        modalChips.innerHTML = '<span class="chip-empty">no tags yet</span>';
        return;
      }

      modalChips.innerHTML = '';
      for (const tag of modalTags) {
        const chip   = document.createElement('div');
        chip.className = 'chip';
        const label  = document.createElement('span');
        label.textContent = tag;
        const remove = document.createElement('button');
        remove.className = 'chip-remove';
        remove.textContent = '✕';
        remove.title = `Remove "${tag}"`;
        remove.addEventListener('click', () => {
          modalTags = modalTags.filter(t => t !== tag);
          renderModalChips();
        });
        chip.appendChild(label);
        chip.appendChild(remove);
        modalChips.appendChild(chip);
      }
    }

    function addTagFromInput() {
      const incoming = tagInput.value.split(',').map(t => t.trim().toLowerCase()).filter(Boolean);
      for (const t of incoming) {
        if (!modalTags.includes(t)) modalTags.push(t);
      }
      tagInput.value = '';
      renderModalChips();
    }

    async function saveTagModal() {
      if (!modalEiconName || !tagDB) return;
      await setTags(tagDB, modalEiconName, modalTags);
      tagCache.set(modalEiconName, [...modalTags]);
      // Track recent tags
      if (modalTags.length > 0) await saveRecentTags(modalTags);
      // Push updated tags to search worker
      refreshWorkerTags();
      // Refresh tag button on visible cells
      for (const cell of indexToCell.values()) {
        if (cell.el.dataset.name === modalEiconName) {
          cell.tagBtn.classList.toggle('has-tags', modalTags.length > 0);
        }
      }
      const msg = modalTags.length > 0
        ? `Tagged "${modalEiconName}": ${modalTags.join(', ')}`
        : `Cleared tags for "${modalEiconName}"`;
      showMessage(msg);
      closeTagModal();
    }

    // Modal event wiring
    tagInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addTagFromInput(); }
      if (e.key === 'Escape') closeTagModal();
    });
    tagAddBtn.addEventListener('click', addTagFromInput);
    modalClose.addEventListener('click', closeTagModal);
    modalCancel.addEventListener('click', closeTagModal);
    modalSave.addEventListener('click', saveTagModal);
    backdrop.addEventListener('click', e => { if (e.target === backdrop) closeTagModal(); });

    // ── Boot ──────────────────────────────────────────────────────────
    async function boot() {
      let names, groups;
      try {
        const db        = await openDB(IDB_NAME, IDB_VER, STORE);
        const cached    = await idbGet(db, STORE, 'names');
        const cachedGrp = await idbGet(db, STORE, 'groups');
        const fetchedAt = await idbGet(db, STORE, 'fetchedAt');
        const age       = fetchedAt ? (Date.now() / 1000) - fetchedAt : Infinity;

        if (cached && cachedGrp && age < CACHE_MAX) {
          names  = cached;
          groups = cachedGrp;
        } else {
          loading.textContent = 'Downloading index…';
          const res = await fetch(WORKER_BASE + '/index');
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          loading.textContent = 'Decompressing + grouping…';
          const result = await decompress(await res.arrayBuffer());
          names  = result.names;
          groups = result.groups;
          await idbSet(db, STORE, 'names',     names);
          await idbSet(db, STORE, 'groups',    groups);
          await idbSet(db, STORE, 'fetchedAt', Math.floor(Date.now() / 1000));
        }
      } catch (err) {
        loading.textContent = `Failed to load: ${err.message}`;
        return;
      }

      allNames   = names;
      nameGroups = groups;
      applyShuffledDisplay(getSeed());

      // Open tag database and warm the cache
      tagDB    = await openTagDB();
      tagCache = await getAllTags(tagDB);
      await loadRecentTags();

      loading.style.display    = 'none';
      statCount.textContent    = `${allNames.length.toLocaleString()} eicons`;
      btnShuffle.disabled      = false;
      btnDevTags.disabled      = false;
      searchInput.disabled     = false;
      searchInput.placeholder  = 'Search eicons by name…';

      initSearchWorker(allNames);
      recalc();
      scheduleUpdate();
    }

    boot();
  </script>

</body>
